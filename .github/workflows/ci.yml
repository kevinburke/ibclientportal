name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run go vet
        run: go vet -trimpath ./...

      # Ensure flex/flex_sections.go stays in sync with flex/testdata/sample.xml.
      - name: Check generated code is up to date
        run: |
          go install github.com/kevinburke/differ@latest
          differ go generate ./...

      # -short skips integration tests that require a running IB gateway
      - name: Run tests
        run: go test -trimpath -short ./...
